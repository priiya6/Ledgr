services:
  - type: keyvalue
    name: ledgr-redis
    region: singapore
    plan: free

  - type: web
    runtime: node
    name: ledgr-api
    region: singapore
    plan: free
    repo: https://github.com/priiya6/Ledgr
    branch: main
    rootDir: .
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build --workspace=packages/shared && npm run build --workspace=apps/api && npm run prisma:generate --workspace=apps/api
    preDeployCommand: npm run prisma:push --workspace=apps/api
    startCommand: npm run start --workspace=apps/api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ledgr-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ledgr-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: APP_ORIGIN
        value: https://ledgr-pi-two.vercel.app
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: ALERT_EXPENSE_THRESHOLD
        value: "50000"
      - key: INTEGRATIONS_ENABLED
        value: "false"
      - key: ALLOW_FUTURE_RECORD_DATE
        value: "false"
      - key: EXCHANGE_RATE_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "2525"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

databases:
  - name: ledgr-postgres
    region: singapore
    plan: free
